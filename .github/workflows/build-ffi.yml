name: Build FFI Bundles

on:
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Pull Docker image
        run: docker pull ghcr.io/zerolover/mydocker/lo:almalinux

      - name: Build Linux FFI bundle
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            ghcr.io/zerolover/mydocker/lo:almalinux \
            /bin/bash /workspace/hayagriva-ffi/build-ffi.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hayagriva-linux-x86_64-ffi
          path: dist/hayagriva-ffi
          if-no-files-found: error

  build-native:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-15
            artifact_name: hayagriva-macos-arm64-ffi
          - label: macOS x86_64
            runner: macos-15-intel
            artifact_name: hayagriva-macos-x86_64-ffi
          - label: Windows x86_64
            runner: windows-latest
            artifact_name: hayagriva-windows-x86_64-ffi

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build FFI bundle (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: bash hayagriva-ffi/build-ffi.sh

      - name: Build FFI bundle (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        run: hayagriva-ffi\build-ffi.bat

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/hayagriva-ffi
          if-no-files-found: error
